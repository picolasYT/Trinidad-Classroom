<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aula Trinidad</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <main class="shell">
      <section class="panel">
        <div class="eyebrow">Aula Trinidad</div>
        <h1>Ingrese su nombre</h1>
        <p>Esta computadora pertenece al aula. La sesion es temporal y se registra para administracion escolar.</p>
        <form id="session-form">
          <input id="student-name" placeholder="Nombre y apellido del alumno" maxlength="80" />
          <button type="submit">Comenzar sesion</button>
        </form>
        <div id="session-info" class="session-info"></div>
        <div id="message-box" class="message-box hidden"></div>
        <button id="logout-btn" class="secondary hidden">Cerrar sesion</button>
        <div id="lock-overlay" class="lock-overlay hidden">
          <div class="lock-card">
            <h2>Equipo bloqueado</h2>
            <p>El profesor bloqueo esta computadora temporalmente.</p>
          </div>
        </div>
      </section>
    </main>
    <script src="./renderer.js"></script>
  </body>
  </html>
